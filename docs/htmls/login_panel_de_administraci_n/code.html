<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SERVICAR Admin - Secure Login</title>

<style>
        body {
            background-color: theme('colors.surface-dim');
            background-image: radial-gradient(circle at 20% 30%, rgba(15, 82, 186, 0.03) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(15, 82, 186, 0.03) 0%, transparent 40%);
        }
        .login-card {
            box-shadow: 0px 4px 20px rgba(15, 82, 186, 0.05);
            backdrop-filter: blur(8px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<main class="w-full max-w-[440px] animate-in fade-in zoom-in duration-700">
<!-- Branding Header -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl mb-md shadow-sm">
<span class="material-symbols-outlined text-on-primary-container !text-[32px]" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">SERVICAR</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Secure Administration Portal</p>
</div>
<!-- Login Card -->
<div class="login-card bg-surface-container-lowest border border-outline-variant rounded-xl p-md md:p-lg">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Login</h2>
<p class="font-label-md text-label-md text-secondary">Enter your administrator credentials</p>
</div>
<form action="#" class="space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="email">Administrator Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface ring-1 ring-inset ring-transparent focus:ring-2 focus:ring-primary transition-all placeholder:text-outline" id="email" name="email" placeholder="admin@servicar.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface ring-1 ring-inset ring-transparent focus:ring-2 focus:ring-primary transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Security Check (Visual Anchor) -->
<div class="bg-surface-container flex items-center gap-3 p-sm rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="font-label-sm text-label-sm text-on-secondary-container">Encrypted end-to-end sapphire security active</p>
</div>
<!-- CTA -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 px-lg rounded-lg shadow-sm hover:bg-primary-container hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Access System
                    <span class="material-symbols-outlined !text-[18px]">login</span>
</button>
</form>
</div>
<!-- Footer Info -->
<footer class="mt-lg text-center space-y-md">
<div class="flex justify-center gap-lg">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Support</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
<p class="font-label-sm text-label-sm text-outline">© 2024 SERVICAR Workshop Solutions. All rights reserved.</p>
</footer>
</main>
<!-- Background Decorative Element (Safe/Secure Vibe) -->
<div class="fixed bottom-0 right-0 p-lg pointer-events-none opacity-10 hidden md:block">
<img alt="Security Graphic" class="w-64 h-64 object-contain grayscale" data-alt="A highly detailed close-up of a futuristic high-tech server circuit board with glowing sapphire blue lines of data flowing through it. The lighting is low-key and professional, emphasizing a sense of unwavering digital security and advanced technology. The aesthetic is clean and corporate, utilizing deep navy blues and sharp metallic textures to create a mood of protective expertise and calm control." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDCiYHdzNOjsV-i-zYTn7WwaGMIZP8L1opeqmSmGGP9lBxvUkqesXwvt_HlGBAHhyv_Go-UXjrrDeJQsk7c_w9oxEHcHBYZ5X_jBnYU_SKaZ2B20oYo_lXZgY-Fp_oYPc-Fb2FsCA0dHaAz4bzUUPgdB1x1wcBPCFBa1hLGSxlo7cvaAHGznZ0lycIHwpfR24yEIVyg5Ofdinh1pG_l8pL3JjlV537c8ko0MMVw2kfS_jfaWgGTZqj8_2T3p7AKNdpsICnw1nc_1aM"/>
</div>
<script>
        // Simple micro-interaction for the login button
        const form = document.querySelector('form');
        const btn = form.querySelector('button');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            // Artificial delay to simulate secure handshake
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Access Granted`;
                btn.classList.replace('bg-primary', 'bg-green-600');
                
                // Final atmospheric effect before "redirect"
                document.body.classList.add('opacity-0', 'transition-opacity', 'duration-500');
            }, 1800);
        });
    </script>
</body></html>
