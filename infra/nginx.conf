server {
    listen 80;

    # PocketBase — accesible solo vía esta ruta interna.
    # El browser llama /pb/... → nginx lo reenvía a pocketbase:8090/...
    # sin exponer el puerto 8090 al exterior.
    location /pb/ {
        proxy_pass         http://pocketbase:8090/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # SSE (realtime subscriptions)
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_read_timeout 3600s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    # Next.js — todo lo demás
    location / {
        proxy_pass         http://next:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (Next.js HMR / SSE del app)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_read_timeout 86400s;
    }
}
